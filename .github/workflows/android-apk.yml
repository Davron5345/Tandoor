name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk.yml'

env:
  VITE_API_URL: https://tandoor-production.up.railway.app

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm run setup

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -q

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snabzenie-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Summary
        run: |
          ls -lh android/app/build/outputs/apk/debug/
          echo "APK готов — скачайте во вкладке Artifacts этого запуска."
