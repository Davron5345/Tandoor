name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk.yml'

env:
  VITE_API_URL: https://tandoor-production.up.railway.app
  APK_NAME: snabzenie.apk

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm run setup

      - name: Build web assets
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Prepare Android build
        run: |
          chmod +x android/gradlew
          echo "sdk.dir=${ANDROID_HOME}" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "${{ env.APK_NAME }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: snabzenie-debug-apk
          path: ${{ env.APK_NAME }}
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snab-apk-${{ github.run_number }}
          name: Снабжение APK #${{ github.run_number }}
          body: |
            Android-приложение для снабженца (фоновая геолокация).
            Сервер: ${{ env.VITE_API_URL }}
          files: ${{ env.APK_NAME }}
          make_latest: true

      - name: Summary
        run: |
          ls -lh "${{ env.APK_NAME }}"
          echo "Скачать: https://github.com/${{ github.repository }}/releases/latest/download/${{ env.APK_NAME }}"
