name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk.yml'

env:
  VITE_API_URL: https://tandoor-production.up.railway.app
  APK_NAME: snabzenie.apk

permissions:
  contents: write

jobs:
  build-apk:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Cache signing keystore
        uses: actions/cache@v4
        id: keystore
        with:
          path: android/snab-release.keystore
          key: snab-keystore-v1

      - name: Generate signing keystore
        if: steps.keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore android/snab-release.keystore \
            -alias snab -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "tandoor-snab-2026" -keypass "tandoor-snab-2026" \
            -dname "CN=Snab, OU=Tandoor, C=UZ"

      - name: Setup Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          fi

      - name: Install dependencies
        run: npm run setup

      - name: Build web assets
        run: npm run build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Sync Capacitor
        run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: ${{ env.VITE_API_URL }}

      - name: Sync app version metadata
        run: |
          VC=$(grep versionCode android/app/build.gradle | head -1 | awk '{print $2}')
          VN=$(grep versionName android/app/build.gradle | head -1 | awk -F'"' '{print $2}')
          echo "{\"versionCode\": $VC, \"versionName\": \"$VN\"}" > android/app-version.json
          git add android/app-version.json || true

      - name: Prepare Android build
        run: |
          chmod +x android/gradlew
          echo "sdk.dir=${ANDROID_HOME}" > android/local.properties

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "${{ env.APK_NAME }}"
          ls -lh "${{ env.APK_NAME }}"
          unzip -t "${{ env.APK_NAME }}"

      - name: Copy APK for site hosting
        run: |
          mkdir -p client/public/downloads
          cp "${{ env.APK_NAME }}" client/public/downloads/snabzenie.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: snabzenie-debug-apk
          path: ${{ env.APK_NAME }}
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snab-apk-${{ github.run_number }}
          name: Снабжение APK #${{ github.run_number }}
          body: |
            Android-приложение для снабженца (фоновая геолокация).
            Сервер: ${{ env.VITE_API_URL }}
            Установка: скачайте в Chrome (не через Telegram).
          files: ${{ env.APK_NAME }}
          make_latest: true

      - name: Summary
        run: |
          echo "Скачать с сайта: ${{ env.VITE_API_URL }}/downloads/snabzenie.apk"
          echo "GitHub: https://github.com/${{ github.repository }}/releases/latest/download/${{ env.APK_NAME }}"
